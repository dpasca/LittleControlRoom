version: 2

project_name: lcroom

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: lcroom
    main: ./cmd/lcroom
    binary: lcroom
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X lcroom/internal/buildinfo.version={{.Version}} -X lcroom/internal/buildinfo.commit={{.Commit}} -X lcroom/internal/buildinfo.date={{.Date}}
  - id: lcagent
    main: ./cmd/lcagent
    binary: lcagent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X lcroom/internal/buildinfo.version={{.Version}} -X lcroom/internal/buildinfo.commit={{.Commit}} -X lcroom/internal/buildinfo.date={{.Date}}

archives:
  - id: binaries
    ids:
      - lcroom
      - lcagent
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

notarize:
  macos:
    - enabled: '{{ and (isEnvSet "MACOS_SIGN_P12") (ne .Env.MACOS_SIGN_P12 "") (isEnvSet "MACOS_SIGN_PASSWORD") (ne .Env.MACOS_SIGN_PASSWORD "") (isEnvSet "MACOS_NOTARY_KEY") (ne .Env.MACOS_NOTARY_KEY "") (isEnvSet "MACOS_NOTARY_KEY_ID") (ne .Env.MACOS_NOTARY_KEY_ID "") (isEnvSet "MACOS_NOTARY_ISSUER_ID") (ne .Env.MACOS_NOTARY_ISSUER_ID "") }}'
      ids:
        - lcroom
        - lcagent
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: false
  prerelease: auto
