openai_api_key = "sk-your-openai-api-key"

# Boss chat is separate from project-analysis inference.
# Leave boss_chat_backend blank to auto-use openai_api when an OpenAI key exists.
# You can also use local OpenAI-compatible backends: "mlx" or "ollama".
# boss_chat_backend = "openai_api"
# boss_helm_model = "gpt-5.5"
# boss_utility_model = "gpt-5.4-mini"

# Leave blank to use MLX defaults:
# mlx_base_url = "http://127.0.0.1:8080/v1"
# mlx_api_key = "mlx"

# Leave blank to use Ollama defaults:
# ollama_base_url = "http://127.0.0.1:11434/v1"
# ollama_api_key = "ollama"

include_paths = [
  "~/dev/repos",
]

exclude_paths = []
exclude_project_patterns = []
codex_launch_preset = "yolo"

# Experimental LCAgent provider. Leave lcagent_path blank to use the bundled
# sibling binary, PATH lookup, or local go run fallback. The env file should
# contain OPENROUTER_API_KEY; key contents are not copied into this config.
# embedded_lcagent_model = "deepseek/deepseek-v4-pro"
# lcagent_path = ""
# lcagent_env_file = "~/path/to/openrouter.env"
# lcagent_auto = "low"

# Quiet browser automation by default; LCR opens a visible browser only when needed.
playwright_management_mode = "managed"
playwright_default_browser_mode = "headless"
playwright_login_mode = "promote"
playwright_isolation_scope = "task"

interval = "60s"
active-threshold = "20m"
stuck-threshold = "4h"

ai_backend = "opencode"
opencode_model_tier = "free"
