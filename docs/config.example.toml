openai_api_key = "sk-your-openai-api-key"

# Boss chat is separate from project-analysis inference.
# Leave boss_chat_backend blank to auto-use openai_api when an OpenAI key exists.
# You can also use direct providers like "openrouter", "deepseek", "moonshot",
# or "xiaomi", plus local OpenAI-compatible backends: "mlx" or "ollama".
# boss_chat_backend = "openai_api"
# boss_helm_model = "gpt-5.5"
# boss_utility_model = "gpt-5.4-mini"

# Leave blank to use MLX defaults:
# mlx_base_url = "http://127.0.0.1:8080/v1"
# mlx_api_key = "mlx"

# Leave blank to use Ollama defaults:
# ollama_base_url = "http://127.0.0.1:11434/v1"
# ollama_api_key = "ollama"

# Xiaomi direct API. Token Plan keys need the regional token-plan URL shown in
# Xiaomi subscription management, not the regular pay-as-you-go API URL.
# xiaomi_base_url = "https://token-plan-sgp.xiaomimimo.com/v1"
# xiaomi_api_key = ""
# xiaomi_model = "mimo-v2.5-pro"

include_paths = [
  "~/dev/repos",
]

exclude_paths = []
exclude_project_patterns = []
codex_launch_preset = "yolo"

# Experimental LCAgent provider. Leave lcagent_path blank to use the bundled
# sibling binary, PATH lookup, or source-checkout go run fallback. The env file can
# contain OPENROUTER_API_KEY, DEEPSEEK_API_KEY, MOONSHOT_API_KEY, XIAOMI_API_KEY, or
# OPENAI_API_KEY; key contents are not copied into this config.
# embedded_lcagent_model = "deepseek/deepseek-v4-pro"
# embedded_lcagent_reasoning_effort = "low"
# lcagent_path = ""
# lcagent_env_file = "~/path/to/openrouter.env"
# lcagent_provider = "openrouter"
# Utility Model defaults to the same provider/model as the Main Model.
# Set to "off" to disable utility-model search refinement, or choose
# "openrouter", "openai", "deepseek", "moonshot", or "xiaomi" with an optional
# lcagent_utility_model override.
# lcagent_utility_provider = "main"
# lcagent_utility_model = ""
# LCAgent permissions: "off" denies edits/non-read commands, "low" allows
# workspace edits plus read-only/verification commands, and "medium" allows
# workspace-contained commands without repeated approvals.
# lcagent_auto = "low"
# lcagent_tool_profile = "balanced"
# lcagent_route_preset = "balanced" # blank, balanced, quality, mimo-2.5-pro-low/high/max, cheap-scout
# lcagent_context_profile = "balanced" # known model windows adapt packing budgets; unknown models fall back to balanced ~200k chars / large ~600k
# lcagent_request_timeout = "60m"
# Web search: "off", "exa", "google", "searxng", or "browser".
# "browser" uses managed browser automation as a no-API-key fallback.
# lcagent_web_search_backend = "off"

# Quiet browser automation by default; LCR opens a visible browser only when needed.
playwright_management_mode = "managed"
playwright_default_browser_mode = "headless"
playwright_login_mode = "promote"
playwright_isolation_scope = "task"

interval = "60s"
active-threshold = "20m"
stuck-threshold = "4h"

ai_backend = "opencode"
opencode_model_tier = "free"
